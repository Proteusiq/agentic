<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="winterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="breathGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:0.8" />
      <stop offset="40%" style="stop-color:#cbd5e1;stop-opacity:0.4" />
      <stop offset="70%" style="stop-color:#94a3b8;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#winterGradient)"/>
  
  <!-- Snow particles -->
  <circle cx="50" cy="30" r="2" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="120" cy="60" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="200" cy="25" r="2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="280" cy="70" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="350" cy="40" r="2" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="420" cy="20" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="500" cy="55" r="2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="580" cy="35" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="650" cy="65" r="2" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="720" cy="25" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="780" cy="50" r="2" fill="#e2e8f0" opacity="0.5"/>
  
  <circle cx="30" cy="150" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="100" cy="170" r="2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="180" cy="140" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="250" cy="180" r="2" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="330" cy="160" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="450" cy="175" r="2" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="550" cy="145" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="620" cy="185" r="2" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="700" cy="155" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="770" cy="175" r="2" fill="#e2e8f0" opacity="0.5"/>
  
  <!-- Wolf silhouette - centered -->
  <g transform="translate(280, 35)">
    <!-- Wolf head profile -->
    <path d="M0,70 
             Q5,65 10,55 
             L15,35 
             Q18,30 25,28 
             L35,30 
             Q40,25 45,20 
             L50,25 
             Q55,22 60,25 
             L65,35 
             Q75,40 85,50 
             Q95,55 100,65 
             Q105,75 100,85 
             Q90,95 75,100 
             Q60,102 45,100 
             Q30,98 20,90 
             Q10,82 0,70 Z" 
          fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="55" cy="50" r="4" fill="#64748b"/>
    <circle cx="56" cy="49" r="1.5" fill="#e2e8f0"/>
    <!-- Ear detail -->
    <path d="M45,20 Q48,15 50,25" stroke="#475569" stroke-width="1" fill="none"/>
    <path d="M55,22 Q58,18 60,25" stroke="#475569" stroke-width="1" fill="none"/>
    <!-- Nose -->
    <ellipse cx="18" cy="65" rx="5" ry="4" fill="#0f172a"/>
    <!-- Snout detail -->
    <path d="M25,70 Q30,72 40,70" stroke="#475569" stroke-width="0.5" fill="none"/>
  </g>
  
  <!-- Breath cloud - multiple layers for depth -->
  <g filter="url(#blur)">
    <ellipse cx="480" cy="100" rx="150" ry="30" fill="url(#breathGradient)" opacity="0.6"/>
    <ellipse cx="520" cy="95" rx="130" ry="25" fill="url(#breathGradient)" opacity="0.5"/>
    <ellipse cx="560" cy="105" rx="100" ry="20" fill="url(#breathGradient)" opacity="0.4"/>
    <ellipse cx="600" cy="100" rx="70" ry="15" fill="url(#breathGradient)" opacity="0.3"/>
  </g>
  
  <!-- Wispy breath details -->
  <path d="M380,95 Q450,88 520,95 Q590,102 660,92" stroke="#cbd5e1" stroke-width="1.5" fill="none" opacity="0.3" filter="url(#blur)"/>
  <path d="M390,108 Q460,100 530,110 Q600,118 680,105" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.2" filter="url(#blur)"/>
  <path d="M400,100 Q480,95 560,102 Q640,108 720,98" stroke="#cbd5e1" stroke-width="1" fill="none" opacity="0.15" filter="url(#blur)"/>
</svg>
