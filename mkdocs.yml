site_name: AGENTS.md
site_description: Stop the markdown hell. One file is all you need.
site_url: https://proteusiq.github.io/agentic/
repo_url: https://github.com/Proteusiq/agentic
repo_name: Proteusiq/agentic

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: IBM Plex Mono
    code: IBM Plex Mono
  features:
    - content.code.copy
    - navigation.instant
    - navigation.top
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Why: why.md
  - Workflow: workflow.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - attr_list
