site_name: AGENTS.md
site_description: Stop the markdown hell. One file is all you need.
site_url: https://proteusiq.github.io/agentic/
repo_url: https://github.com/Proteusiq/agentic
repo_name: Proteusiq/agentic

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.top
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - attr_list
